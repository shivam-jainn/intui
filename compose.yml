version: '3.8'

services:
  mongodb:
    image: 'mongo:latest'
    volumes:
      - data:/data/db

  database:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: intui-test
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # avoid port clash with host Postgres
    ports:
      - "5433:5432"
    
  rabbitmq:
    image: rabbitmq:4.2.4-management
    environment:
      - RABBITMQ_DEFAULT_USER=rabbit
      - RABBITMQ_DEFAULT_PASS=rabbit
    ports:
      - 15672:15672
      - 5672:5672
    volumes:
      - rabbitmq-lib:/var/lib/rabbitmq/
      - rabbitmq-log:/var/log/rabbitmq

    

volumes:
  data:
  postgres_data:
  localstack_data:
  localstack_persist:  # Local volume for LocalStack persistent data
  rabbitmq-lib:
    driver: local
  rabbitmq-log:
    driver: local